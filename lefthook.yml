pre-commit:
  parallel: false
  commands:
    branch-name:
      run: ./scripts/validate_branch_name.sh
    analyze:
      run: ./scripts/run_flutter.sh analyze
    test:
      run: ./scripts/run_flutter.sh test

commit-msg:
  commands:
    commit-message:
      run: ./scripts/validate_commit_msg.sh {1}

pre-push:
  commands:
    branch-name:
      run: ./scripts/validate_branch_name.sh
