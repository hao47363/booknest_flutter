# APK job runs only for pull_request (not branch pushes). Pushes to feature/* still
# skip APK until you open a PR — that is expected.
name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "perf/**"
      - "ci/**"
      - "build/**"
      - "style/**"
      - "revert/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Lint, test, naming, commit format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate branch name
        if: ${{ github.event_name != 'push' || (github.ref_name != 'main' && github.ref_name != 'develop' && github.ref_name != 'staging' && github.ref_name != 'dev') }}
        env:
          BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: ./scripts/validate_branch_name.sh "$BRANCH_NAME"

      - name: Validate commit messages
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name != 'main' && github.ref_name != 'develop' && github.ref_name != 'staging' && github.ref_name != 'dev') }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi

          COMMITS=$(git rev-list "$RANGE")
          if [[ -z "$COMMITS" ]]; then
            echo "No commits to validate in range: $RANGE"
            exit 0
          fi

          for commit in $COMMITS; do
            message=$(git log --format=%s -n 1 "$commit")
            temp_file="$(mktemp)"
            printf '%s\n' "$message" > "$temp_file"
            ./scripts/validate_commit_msg.sh "$temp_file"
            rm -f "$temp_file"
          done

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    # Artifacts + PR body update only make sense for PRs; push workflows never run this job.
    if: github.event_name == 'pull_request'
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.event.pull_request.number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Update PR description and comment with APK info
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const artifactName = `android-debug-apk-${pullNumber}`;

            const commentMarker = '<!-- apk-artifact-comment -->';
            const commentBody = `${commentMarker}
            ## Android APK (debug)
            - Build succeeded. Download the APK from **this workflow run’s artifacts**: ${runUrl}
            - Artifact name: \`${artifactName}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pullNumber,
            });
            const existingComment = comments.find((c) => c.body && c.body.includes(commentMarker));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: commentBody,
              });
            }

            // PR body (description): inject / replace a machine-managed block (not the same as a review comment).
            const blockStart = '<!-- BOOKNEST_APK_BLOCK_START -->';
            const blockEnd = '<!-- BOOKNEST_APK_BLOCK_END -->';
            const descriptionBlock = `${blockStart}
            ### Android debug APK
            - [Open this workflow run and download **Artifacts** ↓](${runUrl})
            - Artifact: \`${artifactName}\`
            ${blockEnd}`;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            let prBody = pr.body ?? '';
            const i0 = prBody.indexOf(blockStart);
            const i1 = prBody.indexOf(blockEnd);
            if (i0 !== -1 && i1 !== -1 && i1 > i0) {
              prBody =
                prBody.slice(0, i0) +
                descriptionBlock.trim() +
                prBody.slice(i1 + blockEnd.length);
            } else {
              prBody =
                prBody.trim().length > 0
                  ? `${prBody.trimEnd()}\n\n${descriptionBlock.trim()}`
                  : descriptionBlock.trim();
            }
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pullNumber,
              body: prBody,
            });
